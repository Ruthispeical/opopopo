<!DOCTYPE html>
<html>
<head>
    <title>Google Style Snake - 10 Modes</title>
    <style>
        body { background: #4a752c; display: flex; flex-direction: column; align-items: center; font-family: 'Arial', sans-serif; color: white; }
        #game-container { position: relative; width: 400px; height: 400px; background: #aad751; border: 10px solid #578a34; }
        canvas { display: block; background: #aad751; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
                    display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #4e85e2; color: white; border: none; border-radius: 5px; margin-top: 10px; }
        select { padding: 5px; font-size: 16px; margin: 10px 0; }
        #score-board { font-size: 24px; margin: 10px; }
    </style>
</head>
<body>
    <div id="score-board">Score: 0</div>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>SNAKE</h1>
            <label>Select Mode:</label>
            <select id="mode-select">
                <option value="classic">Classic Mode</option>
                <option value="fast">Fast Mode</option>
                <option value="slow">Slow Mode</option>
                <option value="borderless">Borderless Mode</option>
                <option value="portal">Portal Mode</option>
                <option value="twin">Twin Mode</option>
                <option value="winged">Winged Mode (Bouncing Fruit)</option>
                <option value="peaceful">Peaceful Mode (No Death)</option>
                <option value="cheese">Cheese Mode (Holes in Tail)</option>
                <option value="poison">Poison Mode (Gray Fruit = Reset)</option>
            </select>
            <button onclick="startGame()">Start Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="overlay" style="display:none;">
            <h1>GAME OVER</h1>
            <p id="final-score"></p>
            <button onclick="resetToMenu()">Main Menu</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score-board");
    const grid = 20;
    
    let snake, fruit, dx, dy, score, gameMode, gameInterval, portalPoints;

    function startGame() {
        gameMode = document.getElementById("mode-select").value;
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("game-over").style.display = "none";
        
        // Initial State
        snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
        dx = grid; dy = 0; score = 0;
        scoreElement.innerHTML = "Score: 0";
        spawnFruit();
        
        // Speed settings based on mode
        let speed = 100;
        if (gameMode === 'fast') speed = 50;
        if (gameMode === 'slow') speed = 200;

        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, speed);
    }

    function spawnFruit() {
        fruit = {
            x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
            y: Math.floor(Math.random() * (canvas.height / grid)) * grid,
            type: (gameMode === 'poison' && Math.random() > 0.7) ? 'poison' : 'normal'
        };
        // Special logic for Portal Mode points
        if (gameMode === 'portal') {
            portalPoints = [{x: 40, y: 40}, {x: 340, y: 340}];
        }
    }

    function gameLoop() {
        if (checkCollision()) return;

        const head = {x: snake[0].x + dx, y: snake[0].y + dy};

        // Mode Logic: Borderless
        if (gameMode === 'borderless') {
            if (head.x < 0) head.x = canvas.width - grid;
            else if (head.x >= canvas.width) head.x = 0;
            if (head.y < 0) head.y = canvas.height - grid;
            else if (head.y >= canvas.height) head.y = 0;
        }

        // Mode Logic: Portal
        if (gameMode === 'portal') {
            portalPoints.forEach((p, i) => {
                if (head.x === p.x && head.y === p.y) {
                    const exit = portalPoints[1 - i];
                    head.x = exit.x; head.y = exit.y;
                }
            });
        }

        snake.unshift(head);

        // Eating logic
        if (head.x === fruit.x && head.y === fruit.y) {
            if (fruit.type === 'poison') {
                endGame(); return;
            }
            score += 1;
            scoreElement.innerHTML = "Score: " + score;
            spawnFruit();
            if (gameMode === 'twin') snake.push({...snake[snake.length-1]}); // Twin Mode grows double
        } else {
            snake.pop();
        }

        draw();
    }

    function checkCollision() {
        const head = snake[0];
        
        // Wall collision (unless Borderless or Peaceful)
        if (gameMode !== 'borderless' && gameMode !== 'peaceful') {
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                endGame(); return true;
            }
        }
        
        // Self collision (unless Peaceful)
        if (gameMode !== 'peaceful') {
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    // Cheese mode allows passing through parts
                    if (gameMode === 'cheese' && i % 2 === 0) continue; 
                    endGame(); return true;
                }
            }
        }
        return false;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Fruit
        ctx.fillStyle = (fruit.type === 'poison') ? "gray" : "#ff0000";
        ctx.fillRect(fruit.x, fruit.y, grid-2, grid-2);

        // Draw Snake
        snake.forEach((part, index) => {
            ctx.fillStyle = (index === 0) ? "#4e85e2" : "#578a34";
            ctx.fillRect(part.x, part.y, grid-2, grid-2);
        });

        // Draw Portals
        if (gameMode === 'portal') {
            ctx.strokeStyle = "orange";
            portalPoints.forEach(p => ctx.strokeRect(p.x, p.y, grid, grid));
        }
    }

    function endGame() {
        clearInterval(gameInterval);
        document.getElementById("game-over").style.display = "flex";
        document.getElementById("final-score").innerHTML = "Final Score: " + score;
    }

    function resetToMenu() {
        document.getElementById("game-over").style.display = "none";
        document.getElementById("start-screen").style.display = "flex";
    }

    // Controls
    window.addEventListener("keydown", e => {
        if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
        else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
        else if (e.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
        else if (e.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
    });
</script>
</body>
</html>
